# 강의실 좌석 순찰 위치 설정 (Gazebo classroom.world 기준)
#
# 좌석 실제 위치:  A1(2.0, 2.5)  A2(2.0, -2.5)
#                  B1(-2.0, 2.5)  B2(-2.0, -2.5)
#
# 순찰 위치 = 로봇이 좌석 앞에 서는 위치 (약 1m 앞)
# yaw = 로봇이 좌석을 바라보는 방향
#   0.0    → +x 방향 (칠판 쪽)
#   3.14   → -x 방향 (입구 쪽)
#
#   [칠판] x=+5
#   ┌─────────────────────────┐
#   │  [A1]        [A2]       │  y = ±2.5
#   │                         │
#   │  [B1]        [B2]       │  y = ±2.5
#   └─────────────────────────┘ x=-5 [입구]
#      로봇 시작: x=-4.5, y=0
#
# seat_x/seat_y = 좌석 실제 위치 (RViz 시각화 마커용)
seats:
  A1:
    x: 1.0
    y: 2.5
    yaw: 0.0
    seat_x: 2.0
    seat_y: 2.5
  A2:
    x: 1.0
    y: -2.5
    yaw: 0.0
    seat_x: 2.0
    seat_y: -2.5
  B1:
    x: -1.0
    y: 2.5
    yaw: 3.14159
    seat_x: -2.0
    seat_y: 2.5
  B2:
    x: -1.0
    y: -2.5
    yaw: 3.14159
    seat_x: -2.0
    seat_y: -2.5